# Copy to agent_config.yaml (gitignored) and fill in the credentials Band shows
# when you register each External Agent (Agents → New Agent → External).
# The api_key is shown ONCE at creation — copy it immediately.
# Also rename each agent in the Band UI to match the role name below.

facilitator:
  agent_id: "REPLACE_WITH_BAND_AGENT_UUID"
  api_key: "REPLACE_WITH_BAND_API_KEY"

ripple_analyst:
  agent_id: "REPLACE_WITH_BAND_AGENT_UUID"
  api_key: "REPLACE_WITH_BAND_API_KEY"

test_debugger:
  agent_id: "REPLACE_WITH_BAND_AGENT_UUID"
  api_key: "REPLACE_WITH_BAND_API_KEY"

# Orchestrator — a 4th agent that ONLY creates + seeds rooms (never reasons, never
# @mentioned back). It exists because Band's Human API (posting as the user) is
# Enterprise-only, and the Facilitator can't seed itself (Band filters own messages).
# Register it like the others (Agents → New Agent → External), then fill in below.
# Its key also goes in Vercel env as BAND_ORCHESTRATOR_KEY for POST /api/ripple.
orchestrator:
  agent_id: "REPLACE_WITH_BAND_AGENT_UUID"
  api_key: "REPLACE_WITH_BAND_API_KEY"
